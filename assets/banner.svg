<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <!-- Animated background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#1a1a2e;#16213e;#0f0c29" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#533483;#302b63;#1b1464" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#1a1a2e;#24243e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Neon glow filter for title -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pink glow for subtitle -->
    <filter id="pinkglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ff6ec7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star sparkle filter -->
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100,100,255,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- Horizon gradient -->
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="85%" stop-color="rgba(255,110,199,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,60,120,0.15)"/>
    </linearGradient>

    <!-- Animated line gradient -->
    <linearGradient id="scanline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="rgba(0,240,255,0.15)"/>
      <stop offset="60%" stop-color="rgba(0,240,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="8"/>

  <!-- Grid overlay -->
  <rect width="900" height="300" fill="url(#grid)" rx="8"/>

  <!-- Horizon glow at bottom -->
  <rect width="900" height="300" fill="url(#horizon)" rx="8"/>

  <!-- Animated horizontal scanline -->
  <rect x="0" y="0" width="900" height="2" fill="url(#scanline)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,20;0,280;0,20" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative corner brackets -->
  <g stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.3">
    <!-- Top-left -->
    <path d="M 30,20 L 20,20 L 20,30"/>
    <path d="M 30,22 L 22,22 L 22,30"/>
    <!-- Top-right -->
    <path d="M 870,20 L 880,20 L 880,30"/>
    <path d="M 870,22 L 878,22 L 878,30"/>
    <!-- Bottom-left -->
    <path d="M 30,280 L 20,280 L 20,270"/>
    <path d="M 30,278 L 22,278 L 22,270"/>
    <!-- Bottom-right -->
    <path d="M 870,280 L 880,280 L 880,270"/>
    <path d="M 870,278 L 878,278 L 878,270"/>
  </g>

  <!-- Floating diamond shapes -->
  <g fill="none" stroke-width="1" opacity="0.15">
    <rect x="60" y="60" width="12" height="12" transform="rotate(45,66,66)" stroke="#00f0ff">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="800" y="80" width="10" height="10" transform="rotate(45,805,85)" stroke="#ff6ec7">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="140" y="230" width="8" height="8" transform="rotate(45,144,234)" stroke="#39ff14">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="750" y="220" width="14" height="14" transform="rotate(45,757,227)" stroke="#bc13fe">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <rect x="350" y="40" width="9" height="9" transform="rotate(45,354.5,44.5)" stroke="#ff6ec7">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <rect x="580" y="250" width="11" height="11" transform="rotate(45,585.5,255.5)" stroke="#00f0ff">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3.8s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>

  <!-- Pulsing dots / stars -->
  <g filter="url(#sparkle)">
    <circle cx="120" cy="50" r="1.5" fill="#00f0ff">
      <animate attributeName="r" values="1;2.5;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="45" r="1.5" fill="#ff6ec7">
      <animate attributeName="r" values="1;2;1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="250" cy="260" r="1" fill="#39ff14">
      <animate attributeName="r" values="0.8;2;0.8" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="680" cy="270" r="1.5" fill="#bc13fe">
      <animate attributeName="r" values="1;2.5;1" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="450" cy="30" r="1" fill="#ffffff">
      <animate attributeName="r" values="0.5;1.8;0.5" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="50" cy="150" r="1" fill="#00f0ff">
      <animate attributeName="r" values="0.8;1.8;0.8" dur="3.2s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="850" cy="160" r="1" fill="#ff6ec7">
      <animate attributeName="r" values="0.6;2;0.6" dur="3.8s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
  </g>

  <!-- Small horizontal accent lines -->
  <line x1="60" y1="140" x2="120" y2="140" stroke="#00f0ff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="780" y1="160" x2="840" y2="160" stroke="#ff6ec7" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite" begin="1s"/>
  </line>

  <!-- Title text with neon glow -->
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="52" fill="#00f0ff" filter="url(#glow)" letter-spacing="1">
    Awesome AIBuildSpace
  </text>

  <!-- Subtitle with pink glow -->
  <text x="450" y="175" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="17" fill="#ff6ec7" filter="url(#pinkglow)" letter-spacing="3">
    Claude Code CLI  •  Agent Skills  •  MCP  •  OpenClaw
  </text>

  <!-- Thin decorative line under subtitle -->
  <line x1="300" y1="200" x2="600" y2="200" stroke="url(#scanline)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="450" y="230" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="13" fill="#8892b0" letter-spacing="2" opacity="0.7">
    SKILLS  ·  PLUGINS  ·  HOOKS  ·  MCP SERVERS  ·  RISK REGISTRY
  </text>
</svg>
